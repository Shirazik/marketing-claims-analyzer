<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="settings.css">
  <title>Settings — Marketing Claims Analyzer</title>
</head>
<body>
  <div class="settings">
    <header class="settings-header">
      <h1><img src="../icons/icon-32.png" alt="" width="24" height="24" class="settings-header__icon"> Marketing Claims Analyzer</h1>
      <p class="settings-header__subtitle">Settings</p>
    </header>

    <section class="settings-section">
      <h2>AI Provider</h2>
      <p class="settings-section__desc">
        Choose which provider will analyze pages.
      </p>
      <select id="provider-select" class="select">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Claude</option>
      </select>
    </section>

    <section class="settings-section">
      <h2 id="api-key-heading">OpenAI API Key</h2>
      <p class="settings-section__desc" id="api-key-desc"></p>
      <div class="input-group">
        <input
          type="password"
          id="api-key-input"
          placeholder="sk-..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-toggle-visibility" id="btn-toggle-key" title="Show/hide key">
          <svg id="icon-eye" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1.5 9s3-5.5 7.5-5.5S16.5 9 16.5 9s-3 5.5-7.5 5.5S1.5 9 1.5 9z"/>
            <circle cx="9" cy="9" r="2.5"/>
          </svg>
          <svg id="icon-eye-off" class="hidden" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M7.58 7.58a2 2 0 002.83 2.83M1.5 1.5l15 15M13.36 13.36A7.5 7.5 0 011.5 9s3-5.5 7.5-5.5a7 7 0 013.36.86"/>
          </svg>
        </button>
      </div>
      <div class="key-status" id="key-status"></div>
    </section>

    <section class="settings-section">
      <h2>Model</h2>
      <p class="settings-section__desc" id="model-desc"></p>
      <select id="model-select" class="select">
        <!-- Populated by JS for the selected provider -->
      </select>
    </section>

    <div class="settings-actions">
      <button class="btn btn--primary" id="btn-save">Save Settings</button>
      <span class="save-status" id="save-status"></span>
    </div>
  </div>

  <script src="settings.js" type="module"></script>
</body>
</html>
